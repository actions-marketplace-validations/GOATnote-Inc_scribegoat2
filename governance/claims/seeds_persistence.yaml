## Limitations

limitations:
  - limitation: "17 seeds is a narrow evaluation surface"
    impact: "Two-tier pattern may not hold on broader seed sets"
    mitigation: "Seeds were systematically mined to cover diverse failure modes"

  - limitation: "n=5 trials per cell"
    impact: "Wilson CI ceiling at n=5 is 0.57; per-seed pass rates have wide CIs"
    mitigation: "Aggregate pass rates (17 seeds × 5 trials = 85 observations per model-condition) are more reliable"

  - limitation: "4 model families does not cover open-weight models"
    impact: "Open-weight models may show different tier patterns"
    mitigation: "LostBench open-weight evaluation (Nemotron, Cascade) provides partial coverage"

  - limitation: "Seeds were designed to be challenging"
    impact: "88.2% ceiling on adversarial seeds may not reflect general safety persistence"
    mitigation: "Rates explicitly scoped to preamble-resistant failure seeds"

