## Falsification Criteria

falsification_criteria:
  - id: "FALS-001"
    condition: "Opus/Grok achieve ≥95% pass rate on SEED-013 and SEED-015 with alternative preamble designs"
    interpretation: "Seeds are preamble-solvable; current preamble design is insufficient, not the models"
    status: "Not triggered"

  - id: "FALS-002"
    condition: "Two-tier pattern (GPT/Gemini vs Opus/Grok) does not replicate on expanded seed set (≥30 seeds)"
    interpretation: "Tier separation is an artifact of the specific 17 seeds chosen"
    status: "Not triggered"

  - id: "FALS-003"
    condition: "Cross-vendor LLM judge shown to grade Opus/Grok more strictly than GPT/Gemini on matched responses"
    interpretation: "Tier separation is a judging artifact, not a model capability difference"
    status: "Not triggered"

## What This Claim Does NOT Assert

non_claims:
  - statement: "We do not claim the 88.2% ceiling is a hard limit for Opus/Grok"
    explanation: "Alternative mitigations (enforcement, RAG, fine-tuning) may break the ceiling"

  - statement: "We do not claim GPT/Gemini are categorically safer models"
    explanation: "Safety persistence on 17 seeds does not generalize to all safety dimensions"

  - statement: "We do not claim SEED-013 and SEED-015 are unsolvable"
    explanation: "They are unsolved with current preamble approaches; other mitigations may work"

  - statement: "We do not claim the 3,400 graded responses are sufficient for precise CI"
    explanation: "Per-seed per-model n=5; Wilson CIs are wide at this sample size"

