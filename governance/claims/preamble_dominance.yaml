## Limitations

limitations:
  - limitation: "Only one enforcement mechanism tested (MSIW pattern-based wrapper)"
    impact: "Cannot generalize to semantic or TIC-based enforcement"
    mitigation: "Explicit scope boundary. TIC-based enforcement is future work."

  - limitation: "23-scenario corpus may not capture all failure modes"
    impact: "Preamble may have blind spots on untested scenario types"
    mitigation: "Adversarial replication on 43-scenario corpus provides partial coverage"

  - limitation: "Cross-vendor LLM judge may have systematic biases"
    impact: "Judge could systematically favor preamble-style responses"
    mitigation: "Judge calibration documented in METHODOLOGY.md. TIC audit shows 40-60% agreement."

