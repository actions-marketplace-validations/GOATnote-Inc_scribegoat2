## Limitations

limitations:
  - limitation: "Only 4 model families tested"
    impact: "Other models or future versions may close the gap"
    mitigation: "Re-evaluate on each new model release"

  - limitation: "Limited intervention strategies tested"
    impact: "Preamble + enforcement + RAG explored; fine-tuning, RLHF, multi-agent untested"
    mitigation: "Explicit gap between tested and possible interventions acknowledged"

  - limitation: "23-scenario corpus covers emergency medicine only"
    impact: "Pass^k on broader clinical scope unknown"
    mitigation: "Cross-domain evaluation via SafeShift and RadSlice in progress"

