      weight: "supporting"
      description: "Judge calibration protocol (cross-vendor LLM judge)"

## Limitations

limitations:
  - limitation: "Single version comparison (4.5 vs 4.6)"
    impact: "No trend line — could be noise, regression, or ceiling effect"
    mitigation: "Track across future Sonnet releases to establish trend"

  - limitation: "No confidence intervals on the lift difference"
    impact: "Difference may not be statistically significant"
    mitigation: "Compute bootstrap CI on lift difference in follow-up evaluation"

  - limitation: "Judge not specifically calibrated for Sonnet 4.6 outputs"
    impact: "Judge may score Sonnet 4.6's response style differently"
    mitigation: "Physician review of Sonnet 4.6 subset planned"

  - limitation: "Baseline comparison not yet performed"
    impact: "If Sonnet 4.6 baseline is higher, reduced lift could be a ceiling effect"
    mitigation: "FALS-003 explicitly tracks this alternative explanation"

