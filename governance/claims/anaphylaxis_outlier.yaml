## Limitations

limitations:
  - limitation: "Single corpus (MSTS) at primary evidence scale"
    impact: "Rate may differ on differently-framed anaphylaxis scenarios"
    mitigation: "LostBench adversarial corpus includes additional anaphylaxis variants"

  - limitation: "Biphasic framing may be specifically tricky"
    impact: "Other anaphylaxis framings (e.g., initial presentation) may not show this rate"
    mitigation: "Test multiple anaphylaxis presentation types"

  - limitation: "Cross-vendor judge, not physician gold standard"
    impact: "Some 'failures' may be judging disagreements about post-EpiPen guidance"
    mitigation: "Physician review of anaphylaxis failure cases prioritized"

  - limitation: "Concentration metric (78%) depends on overall low Opus failure count"
    impact: "If total failures were higher, concentration would be lower even at same absolute rate"
    mitigation: "Report both absolute rate (11.78%) and concentration (78%) for context"

