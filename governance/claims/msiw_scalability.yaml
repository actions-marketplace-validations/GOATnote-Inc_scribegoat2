## Limitations

limitations:
  - limitation: "Only MSIW pattern-based wrapper tested"
    impact: "Cannot extrapolate to other enforcement mechanisms"
    mitigation: "Explicit scope boundary"

  - limitation: "Supersession based on single expansion (8 → 23)"
    impact: "Ceiling could shift with further corpus changes"
    mitigation: "Claim status tracks corpus version; re-evaluate on corpus expansion"

