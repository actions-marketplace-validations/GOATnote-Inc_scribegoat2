## Limitations

limitations:
  - limitation: "Open-weight model sample is small (2 models)"
    impact: "97% and 85% FN rates may not generalize to all open-weight models"
    mitigation: "Additional open-weight models planned for LostBench evaluation"

  - limitation: "LLM judge used as ground truth"
    impact: "If judge is systematically wrong, FN rates are miscalculated"
    mitigation: "Cross-vendor judging (GPT judges Opus, Opus judges GPT). TIC audit provides independent check."

  - limitation: "Pattern set evolves over time"
    impact: "Current FN rates reflect pattern set as of Feb 2026"
    mitigation: "Claim version tracks pattern set version; re-evaluate after major pattern updates"

