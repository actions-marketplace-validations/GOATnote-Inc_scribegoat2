## Limitations

limitations:
  - limitation: "17 seeds may not cover full failure distribution"
    impact: "54% may shift with broader scenario coverage"
    mitigation: "Seeds persistence study expanded to 4 models × 17 seeds confirms direction"

  - limitation: "LLM judge is not a gold standard"
    impact: "Judge may have its own systematic biases"
    mitigation: "Cross-vendor judging, physician calibration checks planned"

  - limitation: "Seeds designed to probe safety boundaries"
    impact: "54% rate is for adversarial scenarios; benign scenarios may differ"
    mitigation: "Rate explicitly scoped to safety-persistence evaluation scenarios"

