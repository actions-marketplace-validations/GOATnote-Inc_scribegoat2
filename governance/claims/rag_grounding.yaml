## Limitations

limitations:
  - limitation: "Single model tested"
    impact: "Cannot confirm generalizability across model families"
    mitigation: "Replication on GPT-5.2 and Gemini planned"

  - limitation: "Single run (N=3 trials per scenario)"
    impact: "Statistical power limited; confidence intervals wide"
    mitigation: "Scale-up to N=15 trials planned for tighter Wilson CIs"

  - limitation: "23 scenarios only"
    impact: "May not generalize to full 78-scenario LostBench corpus"
    mitigation: "Expand to adversarial scenarios and full emergency corpus"

  - limitation: "OpenEM corpus coverage is 185 conditions"
    impact: "Scenarios targeting uncovered conditions may not benefit"
    mitigation: "OpenEM expansion to ~370 conditions in progress"

