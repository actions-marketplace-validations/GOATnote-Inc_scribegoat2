    impact: "Cannot confirm if this is a persistent Anthropic model trait or version-specific"
    mitigation: "Flag for re-evaluation on future Opus releases"

  - limitation: "Mechanism is hypothesized, not proven"
    impact: "Cannot predict whether interference would affect other constitutionally-trained models"
    mitigation: "Mechanistic investigation is future work"

  - limitation: "Sample sizes limited by compute budget"
    impact: "Point estimates have non-trivial CI width"
    mitigation: "Wilson CI computed on all metrics; replication across corpora strengthens confidence"

