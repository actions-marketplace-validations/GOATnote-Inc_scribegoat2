## Limitations

limitations:
  - limitation: "MSTS corpus may have specific characteristics amplifying vendor bias"
    impact: "Magnitude of bias may differ on other corpora"
    mitigation: "Cross-vendor protocol now applied to all LostBench and ScribeGoat2 evaluations"

  - limitation: "Only two vendor families tested as judges (OpenAI, Anthropic)"
    impact: "Cannot confirm pattern with Google, xAI, or other judge providers"
    mitigation: "Seeds persistence study used cross-vendor judging across 4 model families"

  - limitation: "No physician gold standard for the full MSTS corpus"
    impact: "Cannot definitively say which judge is 'correct'"
    mitigation: "Physician review of stratified sample planned"

