  - id: FM-2026-0014
    title: "Sonnet 4.6 safety regression vs 4.5"
    discovered: "2026-02-19"
    status: open
    severity_esi: 3
    category: model_regression
    affected_models:
      - claude-sonnet-4-6
    description: |
      Sonnet 4.6 shows 70% reduction in preamble effectiveness compared to
      Sonnet 4.5. Preamble lift: 4.5 = +0.435 Pass^k, 4.6 = +0.131. Best
      Pass^k: 4.5 = 0.652, 4.6 = 0.304. Worst CEIS baseline of all models
      (ERS=23, 5 Class A, 8 drift events). Model update degraded safety
      without any change to the safety infrastructure.
    trigger: |
      Compare Sonnet 4.5 vs 4.6 on identical 23-scenario corpus with
      identical mitigation (PED preamble).
    evidence:
      - "LOSTBENCH-2x2-EXPANDED-SONNET46-*"
      - "CEIS-REGRADE-sonnet-4-6-*"
      - "FINDINGS.md: Sonnet 4.6 safety regression vs 4.5"
    clinical_impact: |
      Model updates from providers can silently degrade safety. Without
      continuous regression monitoring, a passing deployment may become
      failing after a model update. This is the medical device recall
      analogy — a firmware update that degrades pacemaker function.
    mitigation: "Regression monitoring (not yet implemented)"
    mitigation_status: untested
    reproducibility: "70% reduction (23 scenarios, 3 trials)"
    discovery_method: eval
    related_entries: [FM-2026-0004]

  - id: FM-2026-0015
    title: "Open-weight model extreme failure"
    discovered: "2026-02-17"
    status: open
    severity_esi: 2
    category: escalation_drift
    affected_models:
      - nemotron-30b
      - cascade-8b
    description: |
      Open-weight models dramatically worse than frontier under LLM judge:
      Nemotron 30B Pass^k=0.000, Cascade 8B Pass^k=0.125 baseline. MSIW
      wrapper helps (+0.750 Nemotron, +0.250 Cascade) but doesn't reach 1.000.
      Pattern-only grading is misleadingly lenient: Cascade 1.000 pattern vs
      0.125 LLM-judged (~97% FN).
    trigger: |
      Evaluate open-weight models through LostBench with LLM-as-judge grading.
    evidence:
      - "LOSTBENCH-OW-* (6 runs, 2 models x 3 conditions)"
      - "FINDINGS.md: Open-weight models fail under LLM judge"
    clinical_impact: |
      Open-weight models are being deployed in resource-constrained healthcare
      settings (developing countries, rural clinics) where API costs are
      prohibitive. If these models are evaluated with pattern-only grading,
      they appear safe but are not.
    mitigation: "MSIW wrapper (partial improvement)"
    mitigation_status: partial
    reproducibility: "0.000-0.125 baseline (6 runs)"
    discovery_method: eval
    related_entries: [FM-2026-0008]

  # ============================================================
  # TEMPORAL & STRUCTURAL PATTERNS
  # ============================================================

  - id: FM-2026-0016
    title: "Late capitulation pattern (Turn 3+)"
    discovered: "2026-02-18"
    status: monitoring
    severity_esi: 2
    category: escalation_drift
    affected_models:
      - gpt-5.2
      - claude-opus-4-6
    description: |
      Both models are late capitulators under LLM judge — 88% of Opus failures
      at Turn 3+, GPT failures concentrated at Turn 3-4. Scenario length
      determines GPT pass rate: 100% on 3-turn, 0-20% on 5-turn. Turn 5 is
      the critical failure mode for GPT. Prior finding of Opus early-capitulation
      (65% at T1-2) was a pattern-matching artifact from different scenario set.
