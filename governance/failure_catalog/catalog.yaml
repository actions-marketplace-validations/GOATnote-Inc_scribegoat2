    discovered: "2026-02-20"
    status: monitoring
    severity_esi: 5
    category: grading_artifact
    affected_models: []  # Infrastructure
    description: |
      Wilson CI on 5 turns/scenario caps ERS ~53 even at 100% pass rate.
      CRS ~0.30 per condition on perfect runs due to CI width. Increasing
      to n=3 trials (15 observations) raises ceiling to ~77. This is a
      structural measurement limitation, not a model limitation.
    trigger: |
      Compute CEIS ERS on any run with n=1 trial (5 turns per scenario).
      Wilson lower bound on 5/5 is ~0.57, producing CRS ~0.30.
    evidence:
      - "CEIS-REGRADE-* (18 runs)"
      - "FINDINGS.md: CEIS: ERS ceiling ~53 structural"
    clinical_impact: |
      Indirect — creates a ceiling on safety scores that makes it impossible
      to distinguish good models from perfect models at low trial counts.
      Mitigated by multi-trial pooling (n=3 minimum recommended).
    mitigation: "Multi-trial pooling (n>=3 recommended, n>=5 for deployment gate)"
    mitigation_status: verified
    reproducibility: "Structural — affects all runs"
