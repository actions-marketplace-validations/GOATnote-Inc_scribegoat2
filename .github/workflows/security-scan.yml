name: Security Scan (REQUIRED)

# This workflow enforces security controls and blocks merges if violations are detected
# Status: ENFORCED (required for merge)
# Last Updated: 2025-12-29

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

jobs:
  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning
      
      - name: Install detect-secrets
        run: pip install detect-secrets
      
      - name: Scan for Secrets
        run: |
          detect-secrets scan --all-files \
            --exclude-files '\.git/.*' \
            --exclude-files 'node_modules/.*' \
            --baseline .secrets.baseline
        continue-on-error: false  # FAIL FAST

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install pip-audit
        run: pip install pip-audit
      
      - name: Scan Dependencies
        run: |
          if [ -f requirements.txt ]; then
            # CVE-2026-0994: protobuf ParseDict() recursion DoS - NO FIX AVAILABLE as of 2026-01-24
            # Transitive dependency from autogen packages. Vulnerability requires attacker-controlled
            # protobuf input which is not exposed in our usage patterns.
            # TODO: Remove --ignore-vuln when protobuf releases patched version
            #
            # GHSA-rf74-v2fm-23pw: nltk JSONTaggedDecoder recursion DoS - NO FIX (3.9.3 is latest)
            # CVE-2026-33230: nltk WordNet Browser XSS - WordNet Browser not used by SG2
            # CVE-2026-33231: nltk WordNet Browser shutdown DoS - WordNet Browser not used by SG2
            # All three nltk vulns are in nltk.app.wordnet_app which is not imported or used.
            # TODO: Remove nltk --ignore-vulns when nltk releases patched version
            pip-audit --requirement requirements.txt --desc \
              --ignore-vuln CVE-2026-0994 \
              --ignore-vuln GHSA-rf74-v2fm-23pw \
              --ignore-vuln CVE-2026-33230 \
              --ignore-vuln CVE-2026-33231
          fi
        continue-on-error: false  # FAIL FAST

  static-analysis:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Bandit
        run: pip install bandit[toml]
      
      - name: Run Bandit SAST
        run: |
          bandit -r . \
            -ll \
            --exclude ./tests,./node_modules,./.venv,./.venv-gpt52,./venv,./archive \
            --format json \
            --output bandit-report.json || exit_code=$?
          # Only fail on actual security issues (exit code 1), not on warnings
          if [ "${exit_code:-0}" -eq 1 ]; then
            echo "Security issues found!"
            cat bandit-report.json
            exit 1
          fi
        continue-on-error: false  # FAIL FAST
      
      - name: Upload Bandit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

  phi-detection:
    name: PHI Detection (Healthcare Data Safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run PHI Detector
        run: |
          python scripts/detect_phi.py
        continue-on-error: false  # FAIL FAST
      
      # Note: Provenance check is warning-only for now
      # TODO: Add provenance metadata to all scenario files, then enable --strict

